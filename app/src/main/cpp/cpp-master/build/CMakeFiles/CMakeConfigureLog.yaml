          c++20 - ISO/IEC 14882:2020
          c++latest ? 標準の最終草案 (機能セットは変更される可能性があります)
      /std:<c11|c17|clatest> C 標準バージョン
         c11 - ISO/IEC 9899:2011
         c17 - ISO/IEC 9899:2018
         clatest - 最新のドラフト標準 (機能セットは変更される可能性があります)
      /permissive[-] 一部の不適合なコードをコンパイルできるようにします
                    (機能セットは変更される可能性があります) (C++20 以降では既定でオフ)
      /Za 拡張機能を無効にする (C++ では推奨されません)
      /ZW WinRT 言語拡張を有効にします        /Zs 構文チェックのみ
      /await 再開可能な関数の拡張機能を有効にする
      /await:strict enable: 標準 C++ 20 コルーチンサポートを以前の言語バージョンで有効にする
      /constexpr:depth<N>     constexpr 評価の再帰の深さ限度 (既定: 512)
      /constexpr:backtrace<N> 診断での N constexpr 評価を示します (既定: 10)
      /constexpr:steps<N>     N ステップ後に constexpr 評価を終了します (既定: 1048576)
      /Zi デバッグ情報を有効にします          /Z7 前の形式のデバッグ情報を有効にします
      /Zo[-] 最適化されたコードのより詳細なデバッグ情報を生成します (既定ではオン)
      /ZH: [MD5 |SHA1 |SHA_256] デバッグ情報でファイルのチェックサムを計算するためのハッシュ アルゴリズム (既定値: SHA_256)
      /Zp[n] 構造体を n バイト境界でパックします
      /Zl .OBJ で既定のライブラリ名を省略します
      /vd{0|1|2} vtordisp を無効/有効にします /vm<x> メンバーへのポインターの種類
      /Zc:arg1[,arg2] 言語準拠です。引数は次のようになります:
        forScope[-]           スコープ ルールに標準 C++ を適用します
        wchar_t[-]            wchar_t はネイティブ型であって、typedef ではありません
        auto[-]               新しい標準 C++ の解釈を auto に適用します
        trigraphs[-]          トライグラフを有効にします (既定でオフ)
        rvalueCast[-]         標準 C++ の明示的な型変換ルールを適用します
                              (C++20 以降では既定でオン、/permissive- によって暗黙的に指定)
        strictStrings[-]      文字列リテラルから [char|wchar_t]* への
                              変換を無効にします (C++20 以降では既定でオン、/permissive- によって暗黙的に指定)
        implicitNoexcept[-]   必須の関数に対して暗黙的な noexcept を有効にします
        threadSafeInit[-]     スレッドセーフなローカル静的初期化を有効にします
        inline[-]             参照されていない関数またはデータが
                              COMDAT である場合、または内部リンケージのみを持つ場合に、この関数またはデータを削除します (既定でオフ)
        sizedDealloc[-]      C++14 グローバル サイズの割り当て解除
                              関数を有効にします (既定でオン)
        throwingNew[-]        演算子 new が失敗時にスローすることを想定します (既定でオフ)
        referenceBinding[-]   テンポラリは const 以外の
                              lvalue 参照にはバインドされません (C++20 以降では既定でオン、/permissive- によって暗黙的に指定)
        twoPhase-             2 フェーズの名前検索を無効にします
        ternary[-]            C++11 のルールを条件演算子に適用します
                              (C++20 以降では既定でオン、/permissive- によって暗黙的に指定)
        noexceptTypes[-]      C++17 の noexcept ルールを適用します (C++17 以降では既定でオン)
        alignedNew[-]         C++17 の動的に割り当てられたオブジェクトのアラインメントを有効にします (既定でオン)
        hiddenFriend[-]        標準 C++ の非表示フレンド ルールを適用します
                              (C++20 以降では既定でオン、/permissive- によって暗黙的に指定)
        externC[-]            標準 C++ のルールを 'extern "C"' 関数に適用します
                              (C++20 以降では既定でオン、/permissive- によって暗黙的に指定)
        lambda[-]             新しいラムダ プロセッサを使用してラムダ サポートを強化します
                              (C++20 以降では既定でオン、/permissive- によって暗黙的に指定)
        tlsGuards[-]          TLS 変数の初期化のランタイム チェックを生成します (既定でオン)
        zeroSizeArrayNew[-]   メンバーの new または delete をサイズが 0 の配列オブジェクトに対して呼び出します (既定でオン)
        static_assert[-]      'static_assert' を厳密に処理します (C++20 以降では既定でオン、
                              /permissive- によって暗黙的に指定)
        gotoScope[-]          変数の初期化を飛び越えることはできません (/permissive- によって暗黙的に指定)
        templateScope[-]       標準 C++ のテンプレート パラメーターのシャドウ処理ルールを適用します
        enumTypes[-]          標準 C++ の基になる列挙型を有効にします (既定でオフ)
        enumEncoding[-]       列挙型の使用を非型テンプレート
                              引数として正しくエンコードします (既定でオフ)
        checkGwOdr[-]         標準 C++ の 1 つの定義ルール違反を
                              /Gw が有効になっている場合に定期用します (既定でオフ)
        nrvo[-]               オプションのコピーと移動の省略を有効にします (C++20 以降では既定でオン、
                              /permissive- または /O2 によって暗黙的に指定)
        __STDC__             C で __STDC__ を 1 に定義します
        __cplusplus[-]        __cplusplus マクロは、サポートされている C++ 標準を報告します (既定でオフ)
        char8_t[-]            C++20 ネイティブ 'u8' リテラルのサポートを 'const char8_t' として有効にします
