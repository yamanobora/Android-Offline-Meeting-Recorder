      /Qpar-report:2 自動並行化診断。並行化されていないループを示します
      /Qvec-report:1 自動ベクトル化診断。ベクトル化されたループを示します
      /Qvec-report:2 自動ベクトル化診断。ベクトル化されていないループを示します
