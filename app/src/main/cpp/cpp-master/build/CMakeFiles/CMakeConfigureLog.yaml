          ECMAParamArray- : パラメーター配列を持つオーバーロードに新しい規則を使用します (/clr:netcore によって暗示されています)
      /fsanitize=address は Address Sanitizer の CodeGen を有効化します
      /homeparams レジスタ内で渡されたパラメーターを強制的にスタックに書き込む
